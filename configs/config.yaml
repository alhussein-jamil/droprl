# Global defaults.
# algorithm: ppo  # optional default; usually set per configs/train/<Task>.yaml

ray:
  num_cpus: auto
  include_dashboard: false

run:
  iters: 20
  chkpt_freq: 2400
  chkpt_every_iters: 250
  chkpt_keep_latest: 0
  render_every: 600
  render_on_best: false
  render_fps: 30
  sim_fps: 30
  render_max_steps: 10000
  # LR scheduler: fixed | dynamic | cosine | linear
  # Legacy ``run.dynamic_lr.enabled: true`` still selects ``dynamic``.
  lr_schedule:
    type: fixed
    min_lr_ratio: 0.01
    max_lr_ratio: 1.0
    warmup_iters: 0
    window_iters: 300
    trend_fast_iters: 50
    trend_slow_iters: 300
    plateau_rel_improvement: 0.015
    breakthrough_rel_improvement: 0.08
    min_reward_scale: 1.0
    peak_near_ratio: 0.90
    regression_drop_ratio: 0.15
    recovery_min_trend: 0.02
    decay_factor: 0.75
    boost_factor: 1.15
    recovery_boost_factor: 1.10
    restart_lr_ratio: 0.5
    restart_after_iters: 400
    cooldown_iters: 250
