# DQN example on discrete-action CartPole (task: cartpole).
algorithm: dqn

run:
  iters: 100
  render_every: 0

training:
  environment:
    clip_actions: false
    normalize_actions: false
  env_runners:
    num_env_runners: 0
    num_envs_per_env_runner: 1
    rollout_fragment_length: 200
    batch_mode: truncate_episodes
  training:
    gamma: 0.99
    lr: 1.0e-3
    train_batch_size: 256
    n_step: 3
    replay_buffer_config:
      type: MultiAgentReplayBuffer
      capacity: 50000
    model:
      fcnet_hiddens: [64, 64]
  framework:
    framework: torch
  resources:
    num_gpus: 0
