run:
  iters: 50
  render_every: 0

training:
  environment:
    clip_actions: false
    normalize_actions: false
  env_runners:
    num_env_runners: auto
    num_envs_per_env_runner: 4
    rollout_fragment_length: auto
    batch_mode: truncate_episodes
  training:
    gamma: 0.99
    lr: 5.0e-4
    train_batch_size: 4096
    minibatch_size: 256
    num_epochs: 10
    clip_param: 0.2
    entropy_coeff: 0.01
    model:
      fcnet_hiddens: [64, 64]
  framework:
    framework: torch
  resources:
    num_gpus: 0
