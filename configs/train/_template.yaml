# Copy to configs/train/<YourTask>.yaml — algorithm + RLlib hyperparameters only.
# Task code (env, callbacks, assets) lives under envs/<your_task>/.

algorithm: ppo  # ppo | sac | dqn

training:
  environment:
    clip_actions: true
    normalize_actions: false
  env_runners:
    num_env_runners: 0
    num_envs_per_env_runner: 1
    rollout_fragment_length: 200
    batch_mode: truncate_episodes
  training:
    gamma: 0.99
    lr: 1.0e-3
    train_batch_size: 4000
    minibatch_size: 256
    num_epochs: 5
    clip_param: 0.2
  framework:
    framework: torch
  resources:
    num_gpus: 0
